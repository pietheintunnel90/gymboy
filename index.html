<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>GymBoy</title>
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      /* Classic Game Boy DMG color palette */
      --gb-light:   #9BBC0F;  /* screen background */
      --gb-mid:     #8BAC0F;  /* mid tone */
      --gb-dark:    #306230;  /* dark elements */
      --gb-darkest: #0F380F;  /* text / darkest */

      --bg:          var(--gb-light);
      --surface:     rgba(139,172,15,0.6);
      --surface2:    rgba(139,172,15,0.8);
      --surface3:    rgba(155,188,15,0.9);
      --border:      rgba(15,56,15,0.25);
      --border2:     rgba(15,56,15,0.4);
      --text:        var(--gb-darkest);
      --text2:       var(--gb-dark);
      --text3:       rgba(48,98,48,0.65);
      --accent:      var(--gb-darkest);
      --accent-glow: rgba(15,56,15,0.3);
      --accent-dark: var(--gb-dark);
      --green:       var(--gb-dark);
      --red:         #3a1a0a;
      --orange:      #2a3a0a;
      --dot-font: 'Press Start 2P', monospace;
      --body-font: 'Inter', -apple-system, sans-serif;
      --nav-h: 0px;
      --header-h: 46px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --gb-btn-a: #e8620a;
    }
    html, body {
      height: 100%; height: 100dvh;
      overflow: hidden;
    }
    body {
      color: var(--text);
      font-family: var(--body-font);
      font-size: 13px;
      line-height: 1.5;

    body > * { position: relative; z-index: 1; }
    /* Dark vignette to ensure readability over grid */
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: radial-gradient(ellipse 100% 100% at 50% 50%,
        transparent 20%, rgba(0,0,0,0.45) 100%);
    }

    /* ── SCREENS ── */
    .screen {
      display: none;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }
    .screen.active { display: flex; }

    /* ── SCREEN HEADER ── */
    .screen-header {
      flex-shrink: 0;
      background: var(--gb-mid);
      border-bottom: 2px solid var(--gb-darkest);
      padding: 0 12px;
      height: var(--header-h);
      display: flex; align-items: center; justify-content: space-between;
      position: relative; z-index: 10;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .screen-header h1 {
      font-family: var(--dot-font);
      font-size: 11px; font-weight: 400;
      letter-spacing: 2px; text-transform: uppercase;
      text-shadow: none;
    }
    .header-sub { font-size: 7px; color: var(--text2); margin-top: 4px; font-family: var(--dot-font); letter-spacing: 0.5px; }

    /* ── SCROLLABLE CONTENT ── */
    .screen-content {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 52px;
    }
    .screen-content::-webkit-scrollbar { display: none; }

    /* ── BOTTOM NAV - hidden, replaced by Game Boy controls ── */
    .bottom-nav { display: none !important; }
    .fab {
      position: absolute;
      bottom: 10px; right: 10px;
      width: 38px; height: 38px;
      background: var(--gb-darkest);
      color: var(--gb-light);
      border: 2px solid var(--gb-darkest); border-radius: 2px;
      font-size: 22px; font-weight: 300;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(15,56,15,0.5);
      z-index: 50;
      transition: transform 0.15s;
    }
    .fab:active { transform: scale(0.91); }

    /* ── GAME BOY WALLPAPER ── */
    #gb-wallpaper {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center top;
      z-index: -1;
      pointer-events: none;
    }

        /* ══════════════════════════════════════════
       LCD OVERLAY — positioned over Game Boy photo
    ══════════════════════════════════════════ */
    :root {
      /* LCD position — calibrated for Nothing Phone 2 & iPhone 16 */
      --lcd-top: 4.3vh;
      --lcd-left: 2.9%;
      --lcd-width: 94.2%;
      --lcd-height: 50.7vh;
    }

    /* Invisible wrapper that positions content over the LCD */
    #gb-app-screens {
      position: fixed;
      display: flex;
      flex-direction: column;
      top: var(--lcd-top);
      left: var(--lcd-left);
      width: var(--lcd-width);
      height: var(--lcd-height);
      overflow: hidden;
      z-index: 10;
      /* Subtle dark tint so text is readable on the gray LCD */
      background: var(--gb-light);
      border-radius: 4px;
    }

    /* Scanline effect — classic GB dot-matrix look */
    #gb-app-screens::after {
      content: '';
      position: absolute; inset: 0;
      background: 
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 3px,
          rgba(15,56,15,0.08) 3px,
          rgba(15,56,15,0.08) 4px
        ),
        repeating-linear-gradient(
          90deg,
          transparent,
          transparent 3px,
          rgba(15,56,15,0.04) 3px,
          rgba(15,56,15,0.04) 4px
        );
      pointer-events: none;
      z-index: 9999;
    }

    /* Screen tab bar inside LCD */
    .gb-screen-topbar {
      flex-shrink: 0;
      height: 20px;
      background: var(--gb-darkest);
      border-bottom: 2px solid var(--gb-darkest);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 8px;
      z-index: 20;
    }
    .gb-screen-tabs-inner {
      display: flex; gap: 2px;
    }
    .gb-screen-tab {
      font-family: var(--dot-font);
      font-size: 4px; letter-spacing: 0.5px;
      color: rgba(155,188,15,0.7);
      padding: 3px 6px;
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .gb-screen-tab.active {
      color: var(--gb-light);
      background: rgba(155,188,15,0.2);
    }
    .gb-screen-time {
      font-family: var(--dot-font);
      font-size: 4px;
      color: rgba(155,188,15,0.8);
    }

    /* Tab dots (shown above photo, outside LCD) */
    .gb-tab-dot {
      display: none; /* hidden, navigation via D-pad or tab bar */
    }

    /* ── EXERCISE BLOCK (workout) ── */
    .exercise-block {
      background: rgba(139,172,15,0.5);
      border-radius: 4px;
      margin: 8px 8px 0;
      overflow: hidden;
      border: 2px solid var(--gb-darkest);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 2px 24px rgba(0,0,0,0.7), inset 0 1px 0 rgba(185,205,220,0.06);
    }
    .ex-block-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 11px 14px;
      border-bottom: 1px solid var(--border);
    }
    .ex-block-name { font-size: 11px; font-weight: 400; font-family: var(--dot-font); letter-spacing: 1px; line-height: 1.8; text-shadow: -1px 0 rgba(255,60,80,0.4), 1px 0 rgba(0,200,255,0.4); }
    .ex-block-prev { font-size: 7px; color: var(--text3); margin-top: 6px; font-family: var(--dot-font); letter-spacing: 0.3px; line-height: 1.8; }
    .btn-remove-ex {
      background: none; border: none; color: var(--text3);
      cursor: pointer; padding: 4px; flex-shrink: 0;
      border-radius: 6px; transition: color 0.15s;
    }
    .btn-remove-ex:active { color: var(--red); }

    /* ── SETS ── */
    .sets-col-header {
      display: grid;
      grid-template-columns: 30px 1fr 1fr 86px;
      gap: 6px;
      padding: 6px 12px;
      font-size: 8px; font-weight: 400; font-family: var(--dot-font);
      color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border);
    }
    .sets-col-header span:nth-child(2),
    .sets-col-header span:nth-child(3) { text-align: center; }
    .set-row {
      display: grid;
      grid-template-columns: 30px 1fr 1fr 86px;
      gap: 6px;
      padding: 6px 12px;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }
    .set-row:last-of-type { border-bottom: none; }
    .set-num {
      font-size: 10px; font-weight: 400; color: var(--text3);
      font-family: var(--dot-font);
      text-align: center;
    }
    .set-input {
      background: var(--gb-mid);
      border: 2px solid var(--gb-darkest);
      border-radius: 2px;
      color: var(--gb-darkest);
      font-size: 15px; font-weight: 500;
      text-align: center;
      padding: 7px 4px;
      width: 100%;
      transition: border-color 0.15s;
    }
    .set-input:focus { outline: none; border-color: var(--accent); }
    .btn-save-set {
      background: var(--gb-dark);
      color: var(--gb-light); border: 1.5px solid var(--gb-darkest); border-radius: 2px;
      padding: 8px 0; font-size: 9px; font-weight: 400;
      font-family: var(--dot-font); letter-spacing: 0.5px;
      text-transform: uppercase;
      cursor: pointer; width: 100%;
      transition: all 0.12s;
    }
    .btn-save-set:active { background: rgba(185,205,220,0.18); }
    .set-row.saved .set-num { color: var(--accent); }
    .set-row.saved .set-val {
      text-align: center; font-size: 11px;
      font-family: var(--dot-font); color: var(--text); letter-spacing: 0.5px;
    }
    .set-checkmark { color: var(--accent); font-size: 14px; font-family: var(--dot-font); text-align: center; }

    .add-set-btn {
      width: 100%; padding: 12px;
      background: none; border: none;
      border-top: 1px solid rgba(185,205,220,0.1);
      color: var(--text3); font-size: 9px;
      font-family: var(--dot-font); letter-spacing: 1px;
      cursor: pointer; transition: color 0.15s;
    }
    .add-set-btn:active { color: var(--accent); }

    /* ── BODYWEIGHT QUICK-TAP ── */
    .bw-set-row {
      display: grid;
      grid-template-columns: 30px 1fr 86px;
      gap: 6px; padding: 8px 12px;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }
    .bw-counter {
      display: flex; flex-direction: column; align-items: center; gap: 2px;
    }
    .bw-count {
      font-family: var(--dot-font); font-size: 14px; color: var(--text);
      line-height: 1; min-width: 48px; text-align: center;
      text-shadow: -1px 0 rgba(255,60,80,0.4), 1px 0 rgba(0,200,255,0.4);
    }
    .bw-tap-btns {
      display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; max-width: 200px;
    }
    .bw-tap-btn {
      background: var(--gb-mid); border: 1.5px solid var(--gb-dark);
      border-radius: 6px; color: var(--text2);
      font-size: 9px; font-weight: 400; font-family: var(--dot-font);
      width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.1s;
      flex-shrink: 0;
    }
    .bw-tap-btn:active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .bw-tap-btn.selected { background: var(--accent); border-color: var(--accent); color: #fff; box-shadow: 0 0 8px var(--accent-glow); }
    .bw-total-bar {
      padding: 10px 14px;
      font-family: var(--dot-font); font-size: 10px;
      color: var(--accent); letter-spacing: 1.5px;
      border-top: 1px solid rgba(185,205,220,0.1);
      text-align: center;
    }

    /* ── WEIGHT/REP STEPPER ── */
    .stepper {
      display: flex; align-items: center; gap: 2px;
    }
    .stepper-btn {
      background: var(--gb-mid); border: 1.5px solid var(--gb-darkest);
      color: var(--gb-dark);
      width: 30px; height: 36px; border-radius: 3px;
      font-size: 10px; font-weight: 400;
      font-family: var(--dot-font);
      cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.08s;
      letter-spacing: 0;
    }
    .stepper-btn:active { background: rgba(185,205,220,0.18); border-color: var(--accent); color: var(--accent); }
    .stepper-input {
      background: var(--gb-mid); border: 1.5px solid var(--gb-darkest);
      border-radius: 2px; color: var(--gb-darkest);
      font-size: 9px; font-weight: 400;
      font-family: var(--dot-font);
      text-align: center; padding: 4px 1px;
      width: 0; flex: 1; min-width: 0;
      transition: border-color 0.15s;
    }
    .stepper-input:focus { outline: none; border-color: var(--accent); }
    .stepper-input::placeholder { color: var(--text3); font-family: var(--dot-font); font-size: 10px; }

    /* ── EXERCISE NOTE (in workout) ── */
    .ex-note {
      font-size: 7px; color: var(--accent); font-family: var(--dot-font);
      margin-top: 6px; line-height: 2;
    }

    /* ── INCREMENT PILLS ── */
    .inc-pills {
      display: flex; flex-wrap: wrap; gap: 6px; padding-top: 6px;
    }
    .inc-pill {
      background: var(--gb-mid); border: 1.5px solid var(--gb-dark);
      border-radius: 2px; padding: 7px 12px;
      font-size: 8px; font-weight: 400; font-family: var(--dot-font); color: var(--text2);
      cursor: pointer; transition: all 0.12s; letter-spacing: 0.5px;
    }
    .inc-pill.active {
      background: var(--gb-dark); border-color: var(--gb-darkest); color: var(--gb-light);
    }

    /* ── NOTES TEXTAREA ── */
    .form-textarea {
      background: var(--gb-mid); border: 1.5px solid var(--gb-darkest);
      border-radius: 2px; color: var(--gb-darkest); font-size: 9px;
      padding: 11px 13px; width: 100%; resize: none; min-height: 72px;
      font-family: var(--dot-font); line-height: 2; letter-spacing: 0.3px;
    }
    .form-textarea:focus { outline: none; border-color: var(--accent); }

    /* ── EDIT BUTTON ── */
    .btn-edit-ex {
      background: none; border: none; color: var(--text2);
      padding: 4px 8px; cursor: pointer; border-radius: 6px; font-size: 16px;
    }
    .btn-edit-ex:active { color: var(--accent); }

    /* ── FAB — repositioned inside LCD overlay ── */
    .fab {
      position: absolute;
      bottom: 10px;
      right: 10px;
      width: 38px; height: 38px;
      background: rgba(8,12,16,0.95);
      color: #e8620a;
      border: 1.5px solid rgba(232,98,10,0.5);
      border-radius: 3px;
      font-size: 22px; font-weight: 300;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(15,56,15,0.5);
      z-index: 50;
      transition: transform 0.15s;
    }
    .fab:active { transform: scale(0.91); }

    /* ── EMPTY STATE ── */
    .empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px; padding: 48px 32px;
      color: var(--text3); text-align: center;
    }
    .empty-state p { font-size: 15px; line-height: 1.6; }

    /* ── MODALS ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 200;
      display: none;
      align-items: flex-end;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--gb-light);
      border-radius: 8px 8px 0 0;
      width: 100%;
      max-height: 85vh;
      display: flex; flex-direction: column;
      padding-bottom: var(--safe-bottom);
      animation: slideUp 0.25s ease;
      border-top: 2px solid var(--gb-darkest);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      box-shadow: 0 -4px 40px rgba(0,0,0,0.8);
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 16px 13px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .modal-header h2 { font-size: 12px; font-weight: 400; font-family: var(--dot-font); letter-spacing: 1px; text-transform: uppercase; text-shadow: none; }
    .btn-close {
      background: var(--gb-mid); border: 1.5px solid var(--gb-darkest); color: var(--gb-darkest);
      width: 28px; height: 28px; border-radius: 3px;
      font-size: 9px; font-family: var(--dot-font); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      line-height: 1; transition: all 0.12s; letter-spacing: 0;
    }
    .btn-close:active { background: rgba(185,205,220,0.18); color: var(--accent); border-color: var(--accent); }

    /* ── EXERCISE PICKER ── */
    .search-wrap { padding: 10px 14px; flex-shrink: 0; }
    .search-input {
      background: var(--gb-mid);
      border: 1.5px solid var(--gb-darkest);
      border-radius: 2px;
      color: var(--gb-darkest);
      font-size: 10px;
      padding: 11px 13px;
      width: 100%;
      font-family: var(--dot-font); letter-spacing: 0.5px;
    }
    .search-input:focus { outline: none; border-color: var(--accent); }

    .cat-pills {
      display: flex; gap: 6px;
      padding: 0 14px 10px;
      overflow-x: auto; scrollbar-width: none; flex-shrink: 0;
    }
    .cat-pills::-webkit-scrollbar { display: none; }
    .pill {
      background: rgba(185,205,220,0.05); border: 1px solid rgba(185,205,220,0.18);
      border-radius: 3px; padding: 6px 12px;
      font-size: 8px; font-weight: 400; font-family: var(--dot-font); color: var(--text2);
      cursor: pointer; white-space: nowrap; flex-shrink: 0;
      transition: all 0.12s; letter-spacing: 0.5px;
    }
    .pill.active {
      background: rgba(185,205,220,0.12); border-color: var(--accent);
      color: var(--accent);
    }

    .ex-list { overflow-y: auto; flex: 1; }
    .ex-list-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 13px 16px;
      border-bottom: 1px solid rgba(185,205,220,0.1);
      cursor: pointer;
      transition: background 0.1s;
      background: rgba(4,6,9,0.82);
    }
    .ex-list-item:active { background: rgba(185,205,220,0.08); }
    .ex-list-item-name { font-size: 10px; font-weight: 400; font-family: var(--dot-font); letter-spacing: 0.5px; line-height: 1.8; }
    .ex-list-item-cat { font-size: 7px; color: var(--text3); margin-top: 4px; font-family: var(--dot-font); letter-spacing: 0.3px; line-height: 2; }
    .ex-list-item-right { display: flex; align-items: center; gap: 8px; }
    .ex-list { overflow-y: auto; flex: 1; background: rgba(4,6,9,0.75); }
    .btn-del-ex {
      background: none; border: none; color: var(--text3);
      font-size: 16px; cursor: pointer; padding: 4px 6px;
      border-radius: 6px;
    }
    .btn-del-ex:active { color: var(--red); }

    /* ── FORM ── */
    .form-group { padding: 12px 16px; }
    .form-label { font-size: 9px; color: var(--text2); margin-bottom: 10px; display: block; font-weight: 400; font-family: var(--dot-font); text-transform: uppercase; letter-spacing: 0.5px; }
    .form-input {
      background: var(--gb-mid); border: 1.5px solid var(--gb-darkest);
      border-radius: 2px; color: var(--gb-darkest); font-size: 10px;
      padding: 12px 13px; width: 100%;
      font-family: var(--dot-font); letter-spacing: 0.5px;
    }
    .form-input:focus { outline: none; border-color: var(--accent); }
    select.form-input { -webkit-appearance: none; }
    .btn-primary {
      background: rgba(185,205,220,0.07); color: var(--accent); border: 1.5px solid rgba(185,205,220,0.3);
      border-radius: 4px; padding: 13px; font-size: 10px;
      font-weight: 400; font-family: var(--dot-font);
      letter-spacing: 0.5px; text-transform: uppercase;
      cursor: pointer; width: 100%;
      transition: all 0.12s;
    }
    .btn-primary:active { background: rgba(185,205,220,0.18); }

    /* ── HISTORY ── */
    .history-item {
      margin: 10px 12px 0;
      background: rgba(14,14,14,0.88);
      border: 1px solid var(--border);
      border-radius: 14px; overflow: hidden;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 2px 16px rgba(0,0,0,0.3);
    }
    .history-item-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 14px; cursor: pointer;
    }
    .btn-copy-workout {
      background: rgba(185,205,220,0.06); border: 1px solid rgba(185,205,220,0.2);
      border-radius: 8px; color: var(--accent);
      padding: 6px 12px; font-size: 10px; font-weight: 400;
      font-family: var(--dot-font); letter-spacing: 0.5px; text-transform: uppercase; font-size: 7px;
      cursor: pointer; white-space: nowrap; flex-shrink: 0;
      transition: all 0.15s;
    }
    .btn-copy-workout:active { background: rgba(185,205,220,0.1); }
    .history-date { font-size: 13px; font-weight: 400; font-family: var(--dot-font); letter-spacing: 0.5px; }
    .history-meta { font-size: 9px; color: var(--text2); margin-top: 6px; font-family: var(--dot-font); letter-spacing: 0.3px; line-height: 1.8; }
    .history-chevron { color: var(--text3); transition: transform 0.2s; }
    .history-chevron.open { transform: rotate(180deg); }
    .history-detail {
      border-top: 2px solid var(--gb-darkest);
      padding: 12px 14px;
      display: none;
    }
    .history-detail.open { display: block; }
    .history-ex { margin-bottom: 12px; }
    .history-ex:last-child { margin-bottom: 0; }
    .history-ex-name { font-size: 12px; font-weight: 400; font-family: var(--dot-font); letter-spacing: 0.5px; margin-bottom: 5px; color: var(--accent); }
    .history-set-row { font-size: 8px; color: var(--text3); padding: 4px 0; font-family: var(--dot-font); letter-spacing: 0.3px; line-height: 1.8; }
    .history-set-row span { color: var(--text2); font-weight: 400; }

    /* ── INLINE TIMER DISPLAY ── */
    .timer-inline {
      display: none; align-items: center; gap: 5px;
      font-family: var(--dot-font); font-size: 16px; font-weight: 400;
      color: var(--accent); letter-spacing: 2px; line-height: 1;
      text-shadow: -1px 0 rgba(255,60,80,0.5), 1px 0 rgba(0,200,255,0.5);
      cursor: pointer;
    }
    .timer-inline.active { display: flex; }
    .timer-inline.done { color: var(--accent); text-shadow: 0 0 16px var(--accent-glow); animation: flashDone 0.5s ease 4; }
    @keyframes flashDone { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* ── TIMER SETTINGS MODAL ── */
    .setting-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px; border-bottom: 1px solid var(--border);
    }
    .setting-label { font-size: 10px; font-weight: 400; font-family: var(--dot-font); letter-spacing: 0.5px; }
    .setting-sub { font-size: 8px; color: var(--text3); margin-top: 6px; font-family: var(--dot-font); letter-spacing: 0.3px; line-height: 1.8; }
    input[type=range] { width: 130px; accent-color: var(--accent); }
    /* ── SLIDER OVERLAY ── */
    #sliderOverlay {
      position: fixed; left: 0; right: 0;
      bottom: 0;
      background: var(--gb-light);
      border-top: 1px solid rgba(185,205,220,0.2);
      border-bottom: none;
      padding: 14px 18px 18px;
      z-index: 9999;
      display: none;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow: 0 -4px 30px rgba(0,0,0,0.8);
      transition: bottom 0.05s;
    }
    #sliderOverlay.visible { display: block; }
    .slider-row {
      display: flex; align-items: center; gap: 12px;
    }
    .slider-label {
      font-family: var(--dot-font); font-size: 9px;
      color: var(--text3); letter-spacing: 1px;
      text-transform: uppercase; min-width: 32px;
    }
    .slider-val {
      font-family: var(--dot-font); font-size: 18px;
      color: var(--text); min-width: 56px; text-align: right;
      line-height: 1; text-shadow: -1px 0 rgba(255,60,80,0.4), 1px 0 rgba(0,200,255,0.4);
    }
    .slider-val span { font-size: 11px; color: var(--text3); margin-left: 2px; }
    #sliderControl {
      flex: 1; -webkit-appearance: none; appearance: none;
      height: 4px; border-radius: 2px;
      background: linear-gradient(to right, var(--accent) 0%, var(--accent) var(--pct, 30%), rgba(255,255,255,0.12) var(--pct, 30%));
      outline: none; cursor: pointer;
    }
    #sliderControl::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 22px; height: 22px; border-radius: 2px;
      background: var(--accent);
      box-shadow: 0 0 0 2px rgba(185,205,220,0.15), 0 2px 8px rgba(0,0,0,0.8);
      cursor: pointer;
    }
    #sliderControl::-moz-range-thumb {
      width: 22px; height: 22px; border-radius: 2px; border: none;
      background: var(--accent);
      box-shadow: 0 0 0 2px rgba(185,205,220,0.15);
    }

    /* ── CATEGORY PICKER ── */
    .cat-picker-item {
      padding: 12px 14px;
      font-size: 10px; font-family: var(--dot-font);
      color: var(--text2); letter-spacing: 0.5px;
      border-bottom: 1px solid rgba(185,205,220,0.08);
      cursor: pointer; transition: all 0.1s;
    }
    .cat-picker-item:last-child { border-bottom: none; }
    .cat-picker-item:active,
    .cat-picker-item.selected { background: rgba(185,205,220,0.1); color: var(--accent); }

    .toggle {
      width: 44px; height: 26px; background: var(--surface3);
      border-radius: 13px; position: relative; cursor: pointer;
      border: none; transition: background 0.2s;
    }
    .toggle.on { background: var(--accent); }
    .toggle::after {
      content: ''; position: absolute;
      width: 20px; height: 20px; background: white;
      border-radius: 50%; top: 3px; left: 3px;
      transition: transform 0.2s;
    }
    .toggle.on::after { transform: translateX(18px); }

    /* ── FINISH WORKOUT BTN ── */
    .btn-finish {
      background: rgba(185,205,220,0.07); color: var(--accent);
      border: 1.5px solid rgba(185,205,220,0.3); border-radius: 4px;
      padding: 8px 16px; font-size: 9px; font-weight: 400;
      font-family: var(--dot-font); letter-spacing: 0px; text-transform: uppercase;
      cursor: pointer; transition: all 0.12s;
    }
    .btn-finish:active { background: rgba(185,205,220,0.18); }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: calc(var(--nav-h) + var(--safe-bottom) + 16px);
      left: 50%; transform: translateX(-50%);
      background: rgba(20,20,20,0.95); color: var(--text);
      padding: 10px 20px; border-radius: 20px;
      font-size: 11px; z-index: 999;
      font-family: var(--dot-font); letter-spacing: 0.8px;
      opacity: 0; transition: opacity 0.25s;
      white-space: nowrap; pointer-events: none;
      border: 1px solid rgba(185,205,220,0.15);
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    /* ── TIMER BADGE ── */
    .timer-icon-btn {
      background: none; border: none; cursor: pointer;
      color: var(--text2); padding: 4px; border-radius: 8px;
      display: flex; align-items: center; gap: 4px;
      font-size: 12px; transition: color 0.15s;
    }
    .timer-icon-btn:active { color: var(--accent); }
    .timer-icon-btn svg { width: 22px; height: 22px; }
  </style>
</head>

<div id="gb-app-screens">

            <span class="gb-screen-tab active" id="gbTab0" onclick="gbSwitchTab(0)">TRAINING</span>
            <span class="gb-screen-tab" id="gbTab1" onclick="gbSwitchTab(1)">VERLAUF</span>
            <span class="gb-screen-tab" id="gbTab2" onclick="gbSwitchTab(2)">ÜBUNGEN</span>

<!-- ═══════════════ MOTIVATION SPLASH ═══════════════ -->
<div class="modal-overlay" id="modalMotivation" style="align-items:center;justify-content:center">
  <div style="background:rgba(10,10,10,0.97);border:1px solid rgba(185,205,220,0.18);border-radius:4px;
    padding:36px 28px;margin:24px;text-align:center;
    box-shadow:0 0 60px rgba(255,92,26,0.15);backdrop-filter:blur(30px);max-width:340px;width:100%">
    <div style="font-family:'Press Start 2P',monospace;font-size:10px;color:var(--accent);margin-bottom:20px;letter-spacing:2px;text-shadow:-1px 0 rgba(255,60,80,0.6),1px 0 rgba(0,200,255,0.6)">&gt;&gt;&gt; READY &lt;&lt;&lt;</div>
    <div id="motivationText" style="font-family:'Press Start 2P',monospace;font-size:9px;
      color:var(--text);line-height:2.2;letter-spacing:0.5px;margin-bottom:28px;
      text-shadow:-1px 0 rgba(255,60,80,0.5),1px 0 rgba(0,200,255,0.5)"></div>
    <button onclick="closeModal('modalMotivation')" style="background:rgba(185,205,220,0.07);color:var(--accent);
      border:1.5px solid rgba(185,205,220,0.35);border-radius:4px;padding:14px 24px;font-family:'Press Start 2P',monospace;
      font-size:8px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;width:100%">LOS GEHTS</button>
  </div>
</div>

<!-- ═══════════════ SCREEN: WORKOUT ═══════════════ -->
<div id="screen-workout" class="screen active">
  <div class="screen-header">
    <div>
      <h1>Heute</h1>
      <div class="header-sub" id="headerDate"></div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <div class="timer-inline" id="timerInline" onclick="openTimerSettings()">
        <span id="timerDisplay">0:00</span>
      </div>
      <button class="timer-icon-btn" onclick="openTimerSettings()" id="timerIconBtn" title="Pausentimer">
        <svg width="24" height="24" viewBox="0 0 14 16" fill="currentColor" shape-rendering="crispEdges">
          <!-- Pixel stopwatch -->
          <rect x="4" y="0" width="6" height="1"/>
          <rect x="3" y="1" width="2" height="1"/><rect x="9" y="1" width="2" height="1"/>
          <rect x="2" y="2" width="10" height="1"/>
          <rect x="1" y="3" width="1" height="9"/><rect x="12" y="3" width="1" height="9"/>
          <rect x="0" y="4" width="1" height="7"/><rect x="13" y="4" width="1" height="7"/>
          <rect x="1" y="12" width="12" height="1"/><rect x="2" y="13" width="10" height="1"/>
          <rect x="3" y="14" width="8" height="1"/><rect x="4" y="15" width="6" height="1"/>
          <!-- Clock hands -->
          <rect x="6" y="5" width="2" height="4"/><rect x="6" y="9" width="3" height="2"/>
        </svg>
      </button>
      <button class="btn-finish" id="finishBtn" onclick="finishWorkout()" style="display:none">✓ Fertig</button>
    </div>
  </div>
  <div class="screen-content" id="workoutContent">
    <div class="empty-state" id="workoutEmpty" style="gap:0">
      <p style="font-family:'Press Start 2P',monospace;font-size:11px;line-height:2.2;color:#fff;margin-bottom:16px">BEGINNE DEIN<br>WORKOUT</p>
      <!-- Pixel pull-up animation canvas -->
      <canvas id="pullupCanvas" width="120" height="160"
        style="image-rendering:pixelated;image-rendering:crisp-edges;margin-bottom:4px"></canvas>
      <button onclick="copyLastWorkoutToday()" id="copyLastBtn"
        style="margin-top:12px;background:rgba(185,205,220,0.07);border:1.5px solid rgba(185,205,220,0.3);
        border-radius:3px;color:var(--accent);padding:12px 20px;font-size:8px;font-family:'Press Start 2P',monospace;
        letter-spacing:1px;cursor:pointer;text-transform:uppercase;display:none">
        ⎘ LETZTES WORKOUT<br>KOPIEREN
      </button>
    </div>
    <div id="exerciseBlocks"></div>
  </div>
  <button class="fab" id="addExFab" onclick="openExPicker()">+</button>
</div>

<!-- ═══════════════ SCREEN: HISTORY ═══════════════ -->
<div id="screen-history" class="screen">
  <div class="screen-header">
    <h1>Verlauf</h1>
  </div>
  <div class="screen-content" id="historyContent">
    <div class="empty-state" id="historyEmpty" style="display:none">
      <svg width="64" height="64" viewBox="0 0 16 16" fill="currentColor" shape-rendering="crispEdges" style="opacity:0.35">
        <!-- Pixel clock - same as nav icon -->
        <rect x="4" y="0" width="8" height="2"/><rect x="2" y="2" width="12" height="2"/>
        <rect x="1" y="4" width="2" height="8"/><rect x="13" y="4" width="2" height="8"/>
        <rect x="2" y="12" width="12" height="2"/><rect x="4" y="14" width="8" height="2"/>
        <rect x="7" y="4" width="2" height="4"/><rect x="7" y="8" width="4" height="2"/>
      </svg>
      <p style="font-family:'Press Start 2P',monospace;font-size:9px;line-height:2;color:var(--text3)">NOCH KEIN<br>TRAINING</p>
    </div>
    <div id="historyList"></div>
  </div>
</div>

<!-- ═══════════════ SCREEN: EXERCISES ═══════════════ -->
<div id="screen-exercises" class="screen">
  <div class="screen-header">

    <button onclick="openAddExModal()" style="background:rgba(185,205,220,0.07);border:1.5px solid rgba(185,205,220,0.3);border-radius:3px;color:var(--accent);padding:7px 14px;font-size:9px;font-weight:400;font-family:var(--dot-font);letter-spacing:1px;cursor:pointer;text-transform:uppercase">+ NEU</button>
  </div>
  <div class="search-wrap" style="padding-bottom:0">
    <input type="search" class="search-input" id="exScreenSearch" placeholder="Übung suchen…" oninput="renderExScreen()">
  </div>
  <div class="cat-pills" id="exScreenCats" style="padding-top:10px"></div>
  <div class="ex-list" id="exScreenList"></div>
</div>

// ═══════════════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════════════
function load(key) { try { return JSON.parse(localStorage.getItem(key)); } catch { return null; } }
function save(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

function getExercises() {
  let exs = load(KEYS.exercises);
  if (!exs) { exs = DEFAULT_EXERCISES; save(KEYS.exercises, exs); return exs; }

  let changed = false;

  // 1. Migrate existing exercises: add missing fields
  const existingIds = new Set(exs.map(e => e.id));
  exs = exs.map(e => {
    const d = DEFAULT_EXERCISES.find(d => d.id === e.id);
    let updated = {...e};
    if (updated.increment === undefined) { updated.increment = d?.increment ?? 2.5; changed = true; }
    if (updated.notes === undefined) { updated.notes = ''; changed = true; }
    if (updated.type === undefined && d?.type) { updated.type = d.type; changed = true; }
    // Fix old Klimmzüge name + type
    if (updated.id === 'r2bw' && updated.type !== 'bodyweight') { updated.type = 'bodyweight'; changed = true; }
    return updated;
  });

  // 2. Add any DEFAULT_EXERCISES that are missing from localStorage
  DEFAULT_EXERCISES.forEach(def => {
    if (!existingIds.has(def.id)) {
      exs.push({...def});
      changed = true;
    }
  });

  // 3. Sort by original DEFAULT order (custom exercises go to end)
  const defaultOrder = DEFAULT_EXERCISES.map(e => e.id);
  exs.sort((a, b) => {
    const ai = defaultOrder.indexOf(a.id);
    const bi = defaultOrder.indexOf(b.id);
    if (ai === -1 && bi === -1) return 0;
    if (ai === -1) return 1;
    if (bi === -1) return -1;
    return ai - bi;
  });

  if (changed) save(KEYS.exercises, exs);
  return exs;
}
function saveExercises(e) { save(KEYS.exercises, e); }

function getWorkouts() { return load(KEYS.workouts) || []; }
function saveWorkouts(w) { save(KEYS.workouts, w); }

function getSettings() { return load(KEYS.settings) || {timerDuration:90, autoTimer:false}; }
function saveSettings(s) { save(KEYS.settings, s); }

// ═══════════════════════════════════════════════
// DATE HELPERS
// ═══════════════════════════════════════════════
function todayStr() { return new Date().toISOString().split('T')[0]; }
function fmtDate(str) {
  const d = new Date(str + 'T00:00:00');
  return d.toLocaleDateString('de-DE', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
}
function fmtDateShort(str) {
  const d = new Date(str + 'T00:00:00');
  return d.toLocaleDateString('de-DE', {day:'numeric', month:'short', year:'numeric'});
}

// ═══════════════════════════════════════════════
// TODAY STATE (in-memory, saved only on "Fertig")
// ═══════════════════════════════════════════════
let today = { date: todayStr(), entries: [] };

// ═══════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════
function switchTab(tab) {
  ['workout','history','exercises'].forEach(t => {
    const scr = document.getElementById('screen-'+t);
    if (scr) scr.classList.toggle('active', t===tab);
    const nav = document.getElementById('nav-'+t);
    if (nav) nav.classList.toggle('active', t===tab);
  });
  if (tab==='history') renderHistory();
  if (tab==='exercises') renderExScreen();
  // Sync GB dot indicators
  const tabs = ['workout','history','exercises'];
  const idx = tabs.indexOf(tab);
  tabs.forEach((_, i) => {
    const dot = document.getElementById('gbDot' + i);
    const gbTab = document.getElementById('gbTab' + i);
    if (dot) dot.classList.toggle('active', i === idx);
    if (gbTab) gbTab.classList.toggle('active', i === idx);
  });
}

// ═══════════════════════════════════════════════
// WORKOUT SCREEN
// ═══════════════════════════════════════════════
document.getElementById('headerDate').textContent = fmtDate(todayStr());

function renderWorkout() {
  const blocks = document.getElementById('exerciseBlocks');
  const empty = document.getElementById('workoutEmpty');
  const finBtn = document.getElementById('finishBtn');
  const hasEntries = today.entries.length > 0;

  empty.style.display = hasEntries ? 'none' : 'flex';
  finBtn.style.display = hasEntries ? 'block' : 'none';
  if (!hasEntries) { blocks.innerHTML = ''; return; }

  const exercises = getExercises();
  blocks.innerHTML = today.entries.map((entry, ei) => {
    const ex = exercises.find(e => e.id === entry.exerciseId);
    if (!ex) return '';
    const prev = getPrevPerf(entry.exerciseId);
    const inc = ex.increment ?? 2.5;

    const isBW = ex.type === 'bodyweight';
    const totalBWSaved = isBW ? entry.sets.filter(s=>s.saved).reduce((a,s)=>a+(s.reps||0),0) : 0;

    const setsHTML = entry.sets.map((set, si) => {
      if (set.saved) {
        if (isBW) {
          return `<div class="bw-set-row" style="background:rgba(185,205,220,0.04)" id="sr-${ei}-${si}"
          oncontextmenu="event.preventDefault();openDeleteSet(${ei},${si})"
          ontouchstart="startLongPress(${ei},${si},event)" ontouchend="cancelLongPress()" ontouchmove="cancelLongPress()">
            <div class="set-num" style="color:var(--accent)">${si+1}</div>
            <div style="text-align:center;font-family:var(--dot-font);font-size:16px">${set.reps} <span style="font-size:10px;color:var(--text2)">WDH</span></div>
            <div class="set-checkmark">✓</div>
          </div>`;
        }
        return `<div class="set-row saved" id="sr-${ei}-${si}"
          oncontextmenu="event.preventDefault();openDeleteSet(${ei},${si})"
          ontouchstart="startLongPress(${ei},${si},event)" ontouchend="cancelLongPress()" ontouchmove="cancelLongPress()">
          <div class="set-num">${si+1}</div>
          <div class="set-val">${String(set.weight).replace(',','.')} kg</div>
          <div class="set-val">${set.reps}</div>
          <div class="set-checkmark">✓</div>
        </div>`;
      }
      if (isBW) {
        const cur = set.reps || 0;
        return `<div class="bw-set-row" id="sr-${ei}-${si}"
          oncontextmenu="event.preventDefault();openDeleteSet(${ei},${si})"
          ontouchstart="startLongPress(${ei},${si},event)" ontouchend="cancelLongPress()" ontouchmove="cancelLongPress()">
          <div class="set-num">${si+1}</div>

function getPrevPerf(exerciseId) {
  const workouts = getWorkouts();
  for (let i = workouts.length - 1; i >= 0; i--) {
    if (workouts[i].date === todayStr()) continue;
    const entry = workouts[i].entries.find(e => e.exerciseId === exerciseId);
    if (entry?.sets?.length) {
      return entry.sets.map(s => `${s.weight}kg × ${s.reps}`).join(' · ');
    }
  }
  return null;
}

function updateSet(ei, si, field, val) {
  const clean = String(val).replace(',', '.');
  if (field === 'reps') {
    const v = parseInt(clean);
    today.entries[ei].sets[si][field] = isNaN(v) ? '' : Math.min(Math.max(0,v),30);
  } else {
    const v = parseFloat(clean);
    today.entries[ei].sets[si][field] = clean==='' ? '' : (isNaN(v) ? '' : Math.min(Math.max(0,v),220));
  }
}

function stepSet(ei, si, field, delta) {
  const set = today.entries[ei].sets[si];
  const cur = parseFloat(String(set[field]).replace(',','.')) || 0;
  let next = Math.round((cur + delta) * 100) / 100;
  if (next < 0) next = 0;
  set[field] = field === 'reps' ? Math.round(next) : next;
  renderWorkout();
}

// ═══════════════════════════════════════════════
// SLIDER OVERLAY
// ═══════════════════════════════════════════════
let activeSlider = null; // {ei, si, field}

function showSlider(ei, si, field, step, min, max, unit) {
  activeSlider = { ei, si, field };
  const set = today.entries[ei].sets[si];
  const cur = parseFloat(set[field]) || 0;
  const ctrl = document.getElementById('sliderControl');
  ctrl.min = min; ctrl.max = max;
  ctrl.step = field === 'reps' ? '1' : '0.5'; // smooth steps
  ctrl.value = cur;
  document.getElementById('sliderLabel').textContent = unit.toUpperCase();
  document.getElementById('sliderUnit').textContent = unit;
  document.getElementById('sliderVal').firstChild.textContent = cur || '0';
  updateSliderTrack(cur, min, max);
  document.getElementById('sliderOverlay').classList.add('visible');
  // Position above keyboard immediately
  setTimeout(positionSliderAboveKeyboard, 50);
}

function hideSlider() {
  const overlay = document.getElementById('sliderOverlay');
  overlay.classList.remove('visible');
  overlay.style.bottom = '0px';
  activeSlider = null;
}

function updateSliderTrack(val, min, max) {
  const pct = ((val - min) / (max - min)) * 100;
  document.getElementById('sliderControl').style.setProperty('--pct', pct + '%');
}

let _sliderRaf = null;
function onSliderMove(ctrl) {
  if (!activeSlider) return;
  const val = parseFloat(ctrl.value);
  const { ei, si, field } = activeSlider;
  const min = parseFloat(ctrl.min), max = parseFloat(ctrl.max);

  // Update data immediately (lightweight)
  const displayVal = field === 'reps' ? Math.round(val) : Math.round(val * 2) / 2;
  today.entries[ei].sets[si][field] = displayVal;

  // Throttle DOM updates via rAF for buttery smoothness
  if (_sliderRaf) cancelAnimationFrame(_sliderRaf);
  _sliderRaf = requestAnimationFrame(() => {
    document.getElementById('sliderVal').firstChild.textContent = displayVal;
    updateSliderTrack(val, min, max);
    const inputId = field === 'weight' ? `inp-${ei}-${si}-w` : `inp-${ei}-${si}-r`;
    const inp = document.getElementById(inputId);
    if (inp) inp.value = displayVal;
  });
}

function syncSlider(ei, si, field, val) {
  if (!activeSlider || activeSlider.ei !== ei || activeSlider.si !== si || activeSlider.field !== field) return;
  const ctrl = document.getElementById('sliderControl');
  ctrl.value = parseFloat(val) || 0;
  document.getElementById('sliderVal').firstChild.textContent = val || '0';
  updateSliderTrack(parseFloat(val)||0, parseFloat(ctrl.min), parseFloat(ctrl.max));
}

// Hide slider when tapping outside inputs / on save
document.addEventListener('touchstart', (e) => {
  const overlay = document.getElementById('sliderOverlay');
  if (!overlay.classList.contains('visible')) return;
  const target = e.target;
  if (!target.closest('#sliderOverlay') && !target.closest('.stepper-input')) {
    hideSlider();
  }
}, { passive: true });

// ── KEYBOARD AVOIDANCE: keep slider above keyboard ──
function positionSliderAboveKeyboard() {
  const overlay = document.getElementById('sliderOverlay');
  if (!overlay.classList.contains('visible')) return;
  if (window.visualViewport) {
    // visualViewport.height = visible area above keyboard
    // window.innerHeight - visualViewport.height = keyboard height
    const keyboardH = window.innerHeight - window.visualViewport.height - window.visualViewport.offsetTop;
    overlay.style.bottom = Math.max(0, keyboardH) + 'px';
  }
}

if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', positionSliderAboveKeyboard);
  window.visualViewport.addEventListener('scroll', positionSliderAboveKeyboard);
}

function selectBW(ei, si, n) {
  const set = today.entries[ei].sets[si];
  set.reps = n;
  // Update display without full re-render
  const el = document.getElementById(`bwcount-${ei}-${si}`);
  if (el) el.textContent = n;
  // Highlight selected button
  const row = document.getElementById(`sr-${ei}-${si}`);
  if (row) {
    row.querySelectorAll('.bw-tap-btn').forEach((btn, i) => {
      btn.classList.toggle('selected', i + 1 === n);
    });
    const saveBtn = row.querySelector('.btn-save-set');
    if (saveBtn) saveBtn.style.opacity = '1';
  }
}

// ═══════════════════════════════════════════════
let _lpTimer = null;
let _deleteTarget = null;

function startLongPress(ei, si, e) {
  cancelLongPress();
  _lpTimer = setTimeout(() => {
    if (navigator.vibrate) navigator.vibrate(60);
    openDeleteSet(ei, si);
  }, 500);
}

function cancelLongPress() {
  if (_lpTimer) { clearTimeout(_lpTimer); _lpTimer = null; }
}

function openDeleteSet(ei, si) {
  _deleteTarget = { ei, si };
  const num = si + 1;
  document.getElementById('deleteSetTitle').textContent = `SATZ ${num} LOESCHEN?`;
  openModal('modalDeleteSet');
}

function confirmDeleteSet() {
  if (!_deleteTarget) return;
  const { ei, si } = _deleteTarget;
  today.entries[ei].sets.splice(si, 1);
  _deleteTarget = null;
  closeModal('modalDeleteSet');
  hideSlider();
  renderWorkout();
  toast(`SATZ GELOESCHT`);
}

function saveSet(ei, si) {
  today.entries[ei].sets[si].saved = true;
  hideSlider();
  renderWorkout();
  const _s = getSettings();
  if (_s.autoTimer) startTimer(_s.timerDuration || 90);
}

function addSet(ei) {
  const sets = today.entries[ei].sets;
  const lastSaved = [...sets].reverse().find(s => s.saved);
  sets.push({ weight: lastSaved?.weight ?? '', reps: lastSaved?.reps ?? '', saved: false });
  renderWorkout();
  setTimeout(() => {
    const content = document.getElementById('workoutContent');
    content.scrollTop = content.scrollHeight;
  }, 60);
}

function removeEx(ei) {
  today.entries.splice(ei, 1);
  renderWorkout();
}

function finishWorkout() {
  const validEntries = today.entries
    .map(e => ({...e, sets: e.sets.filter(s => s.saved)}))
    .filter(e => e.sets.length > 0);

  if (!validEntries.length) { toast('Keine gespeicherten Sätze vorhanden.'); return; }

  const workouts = getWorkouts();
  const idx = workouts.findIndex(w => w.date === todayStr());
  const w = { id: Date.now().toString(), date: todayStr(), entries: validEntries };
  if (idx >= 0) workouts[idx] = w; else workouts.push(w);
  saveWorkouts(workouts);

  today = { date: todayStr(), entries: [] };
  renderWorkout();
  updateCopyLastBtn();
  skipTimer();
  toast('TRAINING GESPEICHERT');
}

  document.getElementById('newExCat').value = ex.category;
  document.getElementById('catPickerVal').textContent = ex.category.toUpperCase();
  document.getElementById('catPickerList').style.display = 'none';
  buildCatPicker(ex.category);
  document.getElementById('addExCatGroup').style.display = ex.custom ? 'block' : 'none';
  document.getElementById('newExNotes').value = ex.notes || '';
  renderIncPills(ex.increment ?? 2.5);
  openModal('modalAddEx');
}

function saveExerciseModal() {
  const name = document.getElementById('newExName').value.trim();
  const cat = document.getElementById('newExCat').value;
  const notes = document.getElementById('newExNotes').value.trim();
  const increment = getSelectedInc();
  const exs = getExercises();

  if (editingExId) {
    // Edit existing
    const idx = exs.findIndex(e => e.id === editingExId);
    if (idx < 0) return;
    exs[idx] = { ...exs[idx], notes, increment };
    if (exs[idx].custom) { exs[idx].name = name; exs[idx].category = cat; }
    saveExercises(exs);
    closeModal('modalAddEx');
    renderExScreen();
    toast('ÜBUNG AKTUALISIERT');
  } else {
    // New exercise
    if (!name) { toast('Bitte einen Namen eingeben'); return; }
    exs.push({ id:'custom_'+Date.now(), name, category:cat, custom:true, increment, notes });
    saveExercises(exs);
    closeModal('modalAddEx');
    renderExScreen();
    toast('ÜBUNG GESPEICHERT');
  }
}

function deleteExercise(id, evt) {
  evt.stopPropagation();
  if (!confirm('Übung löschen?')) return;
  saveExercises(getExercises().filter(e => e.id !== id));
  renderExScreen();
}

// HISTORY
// ═══════════════════════════════════════════════
function renderHistory() {
  const workouts = getWorkouts().slice().reverse();
  const exs = getExercises();
  const list = document.getElementById('historyList');
  const empty = document.getElementById('historyEmpty');

  if (!workouts.length) {
    empty.style.display = 'flex'; list.innerHTML = ''; return;
  }
  empty.style.display = 'none';

  list.innerHTML = workouts.map((w, wi) => {
    const exCount = w.entries.length;
    const setCount = w.entries.reduce((s, e) => s + e.sets.length, 0);
    const vol = w.entries.reduce((s, e) => s + e.sets.reduce((ss, set) => ss + (set.weight||0)*(set.reps||0), 0), 0);

    const detail = w.entries.map(entry => {
      const ex = exs.find(e => e.id === entry.exerciseId);
      const name = ex?.name || 'Unbekannte Übung';
      const setsRows = entry.sets.map((s,i) =>
        `<div class="history-set-row">Satz ${i+1}: <span>${s.weight} kg × ${s.reps} Wdh</span></div>`
      ).join('');
      return `<div class="history-ex"><div class="history-ex-name">${name}</div>${setsRows}</div>`;
    }).join('');

    return `<div class="history-item">
      <div class="history-item-header" onclick="toggleHistDetail(${wi})">
        <div style="flex:1;min-width:0">
          <div class="history-date">${fmtDate(w.date)}</div>
          <div class="history-meta">${exCount} Übungen · ${setCount} Sätze${vol>0?' · '+Math.round(vol)+' kg Volumen':''}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;margin-left:8px">
          <button class="btn-copy-workout" onclick="copyWorkout('${w.id}',event)">⎘ Kopieren</button>
          <svg class="history-chevron" id="hchev-${wi}" width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
            <path d="M16.59 8.59L12 13.17 7.41 8.59 6 10l6 6 6-6z"/>
          </svg>
        </div>
      </div>
      <div class="history-detail" id="hdet-${wi}">${detail}</div>
    </div>`;
  }).join('');
}

function toggleHistDetail(wi) {
  const det = document.getElementById('hdet-'+wi);
  const chev = document.getElementById('hchev-'+wi);
  det.classList.toggle('open');
  chev.classList.toggle('open');
}

function updateCopyLastBtn() {
  const workouts = getWorkouts();
  const btn = document.getElementById('copyLastBtn');
  if (!btn) return;
  // Show button only if: no current entries AND history exists
  const past = workouts.filter(w => w.date !== todayStr());
  btn.style.display = (today.entries.length === 0 && past.length > 0) ? 'block' : 'none';
}

function copyLastWorkoutToday() {
  const workouts = getWorkouts();
  const past = workouts.filter(w => w.date !== todayStr());
  if (!past.length) return;
  const last = past[past.length - 1];

  today = {
    date: todayStr(),
    entries: last.entries.map(entry => ({
      exerciseId: entry.exerciseId,
      sets: entry.sets.map(s => ({ weight: s.weight, reps: s.reps, saved: false }))
    }))
  };
  renderWorkout();
  toast('LETZTES WORKOUT GELADEN 💪');
}

function copyWorkout(workoutId, evt) {
  evt.stopPropagation();
  const w = getWorkouts().find(w => w.id === workoutId);
  if (!w) return;

  if (today.entries.length > 0) {
    const hasUnsaved = today.entries.some(e => e.sets.some(s => !s.saved));
    const msg = hasUnsaved
      ? 'Das aktuelle Training hat ungespeicherte Sätze. Trotzdem ersetzen?'
      : 'Das aktuelle Training wird ersetzt. Fortfahren?';
    if (!confirm(msg)) return;
  }

  // Copy all entries – weights & reps prefilled, sets open to confirm
  today = {
    date: todayStr(),
    entries: w.entries.map(entry => ({
      exerciseId: entry.exerciseId,
      sets: entry.sets.map(s => ({ weight: s.weight, reps: s.reps, saved: false }))
    }))
  };

  switchTab('workout');
  renderWorkout();
  toast('Training kopiert – Sätze bereit zum Bestätigen 💪');
}

let timerInterval = null;
let timerSecs = 0;
let audioCtx = null;

function getACtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function synthNote(freq, type, vol, start, dur) {
  try {
    const ctx = getACtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type; osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.001, ctx.currentTime + start);
    gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + start + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + start + dur);
    osc.start(ctx.currentTime + start);
    osc.stop(ctx.currentTime + start + dur + 0.05);
  } catch {}
}

// ── RETRO 8-BIT SOUND ─────────────────────────
let fightAudioBuf = null;

function loadFightSound() {
  try { getACtx().resume(); } catch {}
}

function playTimerDone() {
  const ctx = getACtx();
  const doPlay = () => {
    try {
      const t = ctx.currentTime;
      [[523.25,0.00,0.09],[659.25,0.09,0.09],[783.99,0.18,0.09],
       [1046.5,0.27,0.12],[1318.5,0.39,0.22]].forEach(([freq,delay,dur]) => {
        const osc = ctx.createOscillator(), gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'square'; osc.frequency.value = freq;
        gain.gain.setValueAtTime(0, t+delay);
        gain.gain.linearRampToValueAtTime(0.30, t+delay+0.005);
        gain.gain.setValueAtTime(0.30, t+delay+dur-0.015);
        gain.gain.linearRampToValueAtTime(0, t+delay+dur);
        osc.start(t+delay); osc.stop(t+delay+dur+0.01);
      });
    } catch(e) {}
  };
  if (ctx.state !== 'running') ctx.resume().then(doPlay); else doPlay();
  try {
    if (Notification.permission === 'granted') {
      new Notification('GymLog - Pause vorbei!', {
        body: 'Naechster Satz bereit', tag: 'timer-done', renotify: true
      });
    }
  } catch(e) {}
  if (navigator.vibrate) navigator.vibrate([100,60,100,60,300]);
}

function startTimer(secs) {
  stopTimer();
  timerSecs = secs;
  const el = document.getElementById('timerInline');
  const icon = document.getElementById('timerIconBtn');
  el.classList.remove('done');
  el.classList.add('active');
  if (icon) icon.style.display = 'none';
  updateTimerDisplay();
  closeModal('modalTimer');
  timerInterval = setInterval(() => {
    timerSecs--;
    if (timerSecs <= 0) {
      timerSecs = 0; updateTimerDisplay(); stopTimer();
      playTimerDone();
      el.classList.add('done');
      setTimeout(() => {
        el.classList.remove('active','done');
        if (icon) icon.style.display = '';
      }, 4000);
    } else {
      updateTimerDisplay();
    }
  }, 1000);
}

function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

function skipTimer() {
  stopTimer();
  const el = document.getElementById('timerInline');
  if (el) el.classList.remove('active','done');
  const icon = document.getElementById('timerIconBtn');
  if (icon) icon.style.display = '';
}

function addTimerTime(s) { timerSecs += s; updateTimerDisplay(); }

function updateTimerDisplay() {
  const m = Math.floor(timerSecs/60), s = timerSecs%60;
  const str = `${m}:${s.toString().padStart(2,'0')}`;
  document.getElementById('timerDisplay').textContent = str;
}

// PIXEL PULL-UP ANIMATION
// ═══════════════════════════════════════════════
(function initPullupAnimation() {
  // Grid: 24 wide x 32 tall, scale 5 = 120x160 canvas
  const S = 5;

  const C = {
    bar:  '#c8d8e4',
    skin: '#aab0b0',
    hair: '#d0d4d8',
    top:  '#6e7a88',
    pant: '#586070',
    shoe: '#383e44',
    acc:  '#bcc8d0',
  };

  // Each rect: [x, y, w, h, colorKey]
  // IMPORTANT: arms always overlap with shoulder region of torso
  // so they appear visually connected

  // Shared: pull-up bar (always same)
  const BAR = [
    [1, 0, 22, 2, 'bar'],     // horizontal bar
    [4,  2, 2, 2, 'bar'],     // L support bar
    [18, 2, 2, 2, 'bar'],     // R support bar
  ];

  // ── FRAME 1: hanging, arms fully extended ──
  const F1 = [
    ...BAR,
    // Hands gripping bar
    [4, 4, 2, 2, 'skin'],   // L hand
    [18, 4, 2, 2, 'skin'],  // R hand
    // Arms (2px wide) - rows 6-13
    [4, 6, 2, 8, 'skin'],   // L arm
    [18, 6, 2, 8, 'skin'],  // R arm
    // HEAD between arms (rows 6-11)
    [9, 6, 6, 5, 'skin'],   // head
    [8, 5, 8, 2, 'hair'],   // hair top
    [13, 4, 6, 2, 'hair'],  // ponytail
    [13, 4, 1, 1, 'acc'],   // bow
    [10, 8, 2, 1, 'shoe'],  // L eye
    [14, 8, 2, 1, 'shoe'],  // R eye
    [11, 10, 3, 1, 'shoe'], // mouth
    // SHOULDERS - wide row, overlaps bottom of arms → connection!
    [4, 14, 16, 2, 'top'],  // full shoulder width connects both arms
    // Torso
    [8, 16, 8, 6, 'top'],
    // Waist
    [9, 22, 6, 2, 'skin'],
    // Shorts
    [7, 24, 10, 3, 'pant'],
    // Legs
    [7, 27, 4, 4, 'skin'],   // L leg
    [13, 27, 4, 4, 'skin'],  // R leg
    [6, 30, 5, 2, 'shoe'],   // L shoe
    [13, 30, 5, 2, 'shoe'],  // R shoe
  ];

  // ── FRAME 2: 1/3 up - arms slightly bent ──
  const F2_OFFSET = 3; // body up by 3 units
  const F2 = [
    ...BAR,
    [4, 4, 2, 2, 'skin'],   // L hand
    [18, 4, 2, 2, 'skin'],  // R hand
    // Arms bent slightly - upper arm + angled section
    [4, 6, 2, 5, 'skin'],   // L upper arm
    [4, 11, 5, 2, 'skin'],  // L forearm angling in
    [18, 6, 2, 5, 'skin'],  // R upper arm
    [15, 11, 5, 2, 'skin'], // R forearm angling in
    // Head (raised 3)
    [9, 3, 6, 5, 'skin'],
    [8, 2, 8, 2, 'hair'],
    [13, 1, 6, 2, 'hair'],
    [13, 1, 1, 1, 'acc'],
    [10, 5, 2, 1, 'shoe'],
    [14, 5, 2, 1, 'shoe'],
    [11, 7, 3, 1, 'shoe'],
    // Shoulders - OVERLAPPING arm ends
    [4, 13, 16, 2, 'top'],
    // Torso (raised 3)
    [8, 15, 8, 5, 'top'],
    [9, 20, 6, 2, 'skin'],
    [7, 22, 10, 3, 'pant'],
    [7, 25, 4, 3, 'skin'],
    [13, 25, 4, 3, 'skin'],
    [6, 28, 5, 2, 'shoe'],
    [13, 28, 5, 2, 'shoe'],
  ];

  // ── FRAME 3: 2/3 up - arms at ~90° ──
  const F3 = [
    ...BAR,
    [4, 4, 2, 2, 'skin'],
    [18, 4, 2, 2, 'skin'],
    // Arms: upper arm goes outward, forearm near horizontal
    [3, 4, 2, 4, 'skin'],   // L upper arm going out-down
    [3, 8, 8, 2, 'skin'],   // L forearm horizontal
    [19, 4, 2, 4, 'skin'],  // R upper arm
    [13, 8, 8, 2, 'skin'],  // R forearm
    // Head high (raised 6)
    [9, 1, 6, 5, 'skin'],
    [8, 0, 8, 2, 'hair'],
    [13, 0, 6, 1, 'hair'],
    [13, 0, 1, 1, 'acc'],
    [10, 2, 2, 1, 'shoe'],
    [14, 2, 2, 1, 'shoe'],
    [11, 4, 3, 1, 'shoe'],
    // Shoulders connecting to forearms
    [3, 10, 18, 2, 'top'],
    [8, 12, 8, 5, 'top'],
    [9, 17, 6, 2, 'skin'],
    [7, 19, 10, 3, 'pant'],
    // Legs slightly bent/raised
    [7, 22, 4, 3, 'skin'],
    [13, 22, 4, 3, 'skin'],
    [8, 25, 3, 2, 'skin'],
    [13, 25, 3, 2, 'skin'],
    [7, 27, 5, 2, 'shoe'],
    [13, 27, 5, 2, 'shoe'],
  ];

  // ── FRAME 4: TOP - chin at bar, arms fully bent ──
  const F4 = [
    ...BAR,
    [4, 4, 2, 2, 'skin'],
    [18, 4, 2, 2, 'skin'],
    // Arms: fully bent - upper arm goes far out and down, forearm nearly horizontal
    [2, 4, 2, 5, 'skin'],   // L upper arm (wide)
    [2, 9, 9, 2, 'skin'],   // L forearm (all the way in)
    [20, 4, 2, 5, 'skin'],  // R upper arm
    [13, 9, 9, 2, 'skin'],  // R forearm
    // Head at bar level
    [9, 1, 6, 5, 'skin'],
    [8, 0, 8, 2, 'hair'],
    [13, 0, 5, 1, 'hair'],
    [13, 0, 1, 1, 'acc'],
    [10, 2, 2, 1, 'shoe'],
    [14, 2, 2, 1, 'shoe'],
    [11, 4, 3, 1, 'shoe'],
    // Shoulders at forearm level
    [2, 11, 20, 2, 'top'],
    [8, 13, 8, 5, 'top'],
    [9, 18, 6, 2, 'skin'],
    [7, 20, 10, 3, 'pant'],
    // Legs bent and raised
    [6, 23, 4, 4, 'skin'],
    [14, 23, 4, 4, 'skin'],
    [5, 26, 5, 2, 'shoe'],
    [13, 26, 5, 2, 'shoe'],
  ];

  const FRAMES = [F1, F2, F3, F4, F3, F2];
  const DELAYS = [700, 280, 280, 600, 280, 280];

  let frameIdx = 0;
  let timer = null;

  function draw() {
    const canvas = document.getElementById('pullupCanvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    FRAMES[frameIdx].forEach(([x, y, w, h, k]) => {
      ctx.fillStyle = C[k];
      ctx.fillRect(x * S, y * S, w * S, h * S);
    });
    const delay = DELAYS[frameIdx];
    frameIdx = (frameIdx + 1) % FRAMES.length;
    timer = setTimeout(draw, delay);
  }

  function start() {
    if (timer) clearTimeout(timer);
    frameIdx = 0;
    draw();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', start);
  } else {
    setTimeout(start, 80);
  }
})();

// GAME BOY SCREEN NAVIGATION
// ═══════════════════════════════════════════════
(function initGameBoy() {

  const GB_TABS = ['workout', 'history', 'exercises'];
  let gbCurrentTab = 0;

  // Update tab indicator in the LCD top bar
  function gbUpdateTabUI(idx) {
    GB_TABS.forEach((_, i) => {
      const tab = document.getElementById('gbTab' + i);
      if (tab) tab.classList.toggle('active', i === idx);
    });
    gbCurrentTab = idx;
  }

  // Switch tab
  window.gbSwitchTab = function(idx) {
    if (idx < 0) idx = GB_TABS.length - 1;
    if (idx >= GB_TABS.length) idx = 0;
    switchTab(GB_TABS[idx]);
    gbUpdateTabUI(idx);
  };

  // Swipe left/right on the LCD to switch tabs
  let touchStartX = 0;
  const lcd = document.getElementById('gb-app-screens');
  if (lcd) {
    lcd.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, {passive: true});
    lcd.addEventListener('touchend', e => {
      const diff = touchStartX - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 50) gbSwitchTab(diff > 0 ? gbCurrentTab + 1 : gbCurrentTab - 1);
    }, {passive: true});
  }

  // Keyboard shortcuts (desktop)
  document.addEventListener('keydown', e => {
    if (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA') return;
    if (e.key === 'ArrowLeft')  gbSwitchTab(gbCurrentTab - 1);
    if (e.key === 'ArrowRight') gbSwitchTab(gbCurrentTab + 1);
    if (e.key === 'Enter') {
      if (gbCurrentTab === 0) openExPicker();
      else if (gbCurrentTab === 2) openAddExModal();
    }
    if (e.key === 'Escape') {
      const open = document.querySelector('.modal-overlay.open');
      if (open) open.classList.remove('open');
    }
  });

  // Live clock
  function updateGbClock() {
    const el = document.getElementById('gbClock');
    if (!el) return;
    const now = new Date();
    el.textContent = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  }
  updateGbClock();
  setInterval(updateGbClock, 10000);

})();
